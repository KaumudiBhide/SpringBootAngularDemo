<mat-card class="mat-elevation-z4">

  <mat-card-content>
    <div class="text-center" [style.color]="primaryColor">
      <h5><strong>{{data.title}}</strong></h5>
    </div>

    <p>
      <img mat-card-image src="{{ imgSrc }}" alt="Image" width="100" height="100" />
    </p>

    <div *ngFor="let line of data.message" class="mat-body-1" [style.color]="primaryColor">
      <strong>{{line}}</strong>
    </div>

  </mat-card-content>

  <mat-card-actions>
    <button mat-fab (click)="closeDialog()" [style.color]="primaryColor">
      <mat-icon>{{iconImage}}</mat-icon>
    </button>
  </mat-card-actions>
</mat-card>
