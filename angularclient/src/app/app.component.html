<div class="container">
  <div class="row">
    <div class="col-md-12">
      <div class="card bg-dark my-1">
        <div class="card-body">
          <h2 class="card-title text-center text-white py-1">{{ title }}</h2>
          <ul class="text-center list-inline py-1">
            <li class="list-inline-item">
              <a routerLink="/countries" class="btn btn-info">List Countries</a>
            </li>
            <li class="list-inline-item">
              <a routerLink="/search" class="btn btn-info">Search Countries</a>
            </li>
            <li class="list-inline-item">
              <a routerLink="/coins" class="btn btn-info">Stream Demo</a>
            </li>
            <li class="list-inline-item">
              <a routerLink="/info" class="btn btn-info">Info</a>
            </li>
            <li class="list-inline-item">
              <a class="btn btn-info text-white" (click)="openAboutDialog()">About</a>
            </li>
          </ul>
        </div>
      </div>
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
